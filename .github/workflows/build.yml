name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # allow attaching binaries to Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            built: OpenEVSE-Finder.exe
            asset: OpenEVSE-Finder-windows.exe
          - os: macos-latest
            built: OpenEVSE-Finder
            asset: OpenEVSE-Finder-macos
          - os: ubuntu-latest
            built: OpenEVSE-Finder
            asset: OpenEVSE-Finder-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller openevse_finder.spec

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.built }}" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
